<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제1구역: 심연의 수조</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --panel-glass: rgba(13, 13, 23, 0.75);
            --point-purple: #7928ca; 
            --sub-purple: #a277ff;
            --neon-blue: #00f0ff;
            --text-silver: #f5f5f7;
            --text-dark: #6e6e73;
            --border-line: rgba(162, 119, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-silver);
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 30%, #16122c 0%, #06060c 100%);
            padding: 100px 20px 40px 20px; /* HUD 공간 확보 */
            overflow-x: hidden;
        }

        /* 상단 HUD 디바이스형 디자인 */
        #status-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            max-width: 600px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 20px;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-line);
            border-left: 1px solid var(--border-line);
            border-right: 1px solid var(--border-line);
            border-radius: 0 0 16px 16px;
            z-index: 100;
            gap: 10px;
        }

        .stat-item { 
            text-align: center; 
            position: relative;
        }
        
        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 25%;
            height: 50%;
            width: 1px;
            background: rgba(255,255,255,0.1);
        }

        .stat-label { 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem; 
            color: var(--text-dark); 
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .stat-value { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; 
            font-weight: 800; 
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
            transition: all 0.3s ease;
        }

        /* 메인 게임 프레임 세련화 */
        #game-container {
            width: 100%;
            max-width: 550px;
            background: var(--panel-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px;
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        /* 미디어 영역 고급화 */
        #title-image-container {
            width: 100%;
            height: 280px; 
            margin-bottom: 30px;
            background: #020205;
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        /* 미래지향적 UI 데코레이션 코너선 */
        #title-image-container::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; width: 8px; height: 8px;
            border-top: 2px solid var(--sub-purple);
            border-left: 2px solid var(--sub-purple);
            z-index: 2;
            opacity: 0.7;
        }

        #game-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none; 
            opacity: 0.85; 
        }
        
        .img-placeholder { 
            color: var(--text-dark); 
            font-family: 'Orbitron', sans-serif; 
            font-size: 0.75rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100%;
            letter-spacing: 3px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        #scene-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, var(--sub-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #description {
            font-size: 0.95rem;
            line-height: 1.75;
            color: #b9b9c3;
            margin-bottom: 35px;
            font-weight: 300;
            word-break: keep-all;
        }

        /* 선택지 버튼 디자인 전면 개편 */
        #choices { display: flex; flex-direction: column; gap: 12px; }

        button {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-silver);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 24px;
            font-size: 0.9rem;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 400;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: left;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            border-color: rgba(162, 119, 255, 0.5);
            background: rgba(121, 40, 202, 0.15);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(121, 40, 202, 0.2);
            padding-left: 30px;
        }

        /* 버튼 좌측 포인트 네온 바 */
        button::before {
            content: "";
            position: absolute;
            left: 0; top: 0; width: 3px; height: 100%;
            background: var(--sub-purple);
            opacity: 0;
            transition: opacity 0.3s;
        }
        button:hover::before {
            opacity: 1;
        }

        /* 에러 모드 연출 고도화 */
        .error-mode {
            animation: glitch-heavy 0.3s infinite;
            border-color: #ff1744 !important;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.2) !important;
        }
        
        .error-mode .stat-value {
            color: #ff1744 !important;
            text-shadow: 0 0 10px rgba(255, 23, 68, 0.6);
        }

        @keyframes glitch-heavy {
            0% { transform: translate(0) skew(0deg); }
            20% { transform: translate(-1px, 1px) skew(-0.5deg); }
            40% { transform: translate(-1px, -1px) skew(0.5deg); }
            60% { transform: translate(1px, 1px) skew(0deg); }
            80% { transform: translate(1px, -1px) skew(-0.5deg); }
            100% { transform: translate(0) skew(0deg); }
        }

        /* 모바일 대응 패딩 조절 */
        @media (max-width: 600px) {
            body { padding-top: 90px; }
            #game-container { padding: 24px; }
            #title-image-container { height: 200px; margin-bottom: 20px; }
            #status-bar { width: 92%; border-radius: 0 0 12px 12px; }
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="stat-item"><div class="stat-label">KARMA</div><span id="karma" class="stat-value">0</span></div>
        <div class="stat-item"><div class="stat-label">GREED</div><span id="greed" class="stat-value">0</span></div>
        <div class="stat-item"><div class="stat-label">ASSET</div><span id="asset" class="stat-value">0</span></div>
        <div class="stat-item"><div class="stat-label">NOISE</div><span id="noise" class="stat-value">0</span></div>
    </div>

    <div id="game-container">
        <div id="title-image-container">
            <video id="game-video" autoplay loop muted playsinline></video>
            <div id="placeholder" class="img-placeholder">DATA_VISUALIZING...</div>
        </div>

        <div id="scene-title">INITIATING...</div>
        <div id="description">시스템 로그를 대기 중입니다.</div>
        <div id="choices"></div>
    </div>

    <script>
        let state = { karma: 0, greed: 0, asset: 0, noise: 0, isError: false };

        const scenes = {
            start: {
                title: "[표지] 제1구역 : 심연의 수조",
                desc: "카메라가 어두운 마천루 골목에서 수조를 향해 서서히 줌인합니다. 수조 속 영기가 기괴하게 휘몰아치고, 잭의 붉은 의안이 서늘하게 깜빡입니다. 시스템을 가동하십시오.",
                video: "media/open.mp4",
                choices: [
                    { text: "정화 프로토콜 실행 후 탐색 시작", effect: { karma: 10 }, next: "s1" },
                    { text: "보안 강제 우회 및 즉시 기동", effect: { greed: 10 }, next: "s1" }
                ]
            },
            s1: {
                title: "PHASE 01: DISCOVERY",
                desc: "[조심스러운 탐색] 먼지 쌓인 지하 구역. K의 사이버네틱 팔이 고대 문자가 빛나는 수조 표면을 만집니다. 푸른 영기가 피어오르는 가운데, 저 멀리 잭의 실루엣이 포착됩니다.",
                video: "media/s1.mp4",
                choices: [
                    { text: "안정 모드: 저전력 유지하며 분석", effect: { asset: 50, karma: 15 }, next: "s2" },
                    { text: "가속 모드: 최대 출력으로 재화 투입", effect: { asset: 200, greed: 30, noise: 20 }, next: "s2" }
                ]
            },
            s2: {
                title: "PHASE 02: REPLICATION",
                desc: "[광기의 폭발] K가 황금 재화를 수조에 던지자 복제된 금빛 자원들이 화산처럼 폭발합니다. 그 옆에서 진짜 아버지가 공포에 질려 비명을 지르고 있습니다.",
                video: "media/s2.mp4",
                choices: [
                    { text: "자산 데이터 일부를 전송하여 잭을 회유", effect: { asset: -100, greed: 20 }, next: "s3" },
                    { text: "관리자 권한을 철저히 방어하며 대항", effect: { karma: 20, noise: 10 }, next: "s3" }
                ]
            },
            s3: {
                title: "PHASE 03: CONFLICT",
                desc: "[강탈과 억압] 고압적인 펜트하우스 내부. 잭이 바닥에 묶인 K를 거만하게 내려다봅니다. '이 지하 구역의 모든 데이터는 내 것이다.' 수조가 보랏빛 영기를 뿜으며 진동합니다.",
                video: "media/s3.mp4",
                choices: [
                    { text: "오류를 무시하고 복제 자산 강제 수거", effect: { greed: 50, noise: 50 }, next: "s4", action: "start" },
                    { text: "수조 파괴 프로토콜 가동 및 프로세스 종료", effect: { asset: 0, karma: 40 }, next: "s4", action: "stop" }
                ]
            },
            s4: {
                title: "PHASE 04: SYSTEM COLLAPSE",
                desc: "[복제 대재앙] 아버지가 수조에 빠지며 인과율 오류가 발생했습니다. 수백 명의 아버지가 무한 복제되어 쏟아져 나오고, K는 절망하며 머리를 감싸 쥡니다.",
                video: "media/s4.mp4",
                choices: [
                    { text: "심판의 방으로 진입하여 최종 로그 요청", next: "s5" }
                ]
            },
            s5: {
                title: "PHASE 05: FINAL JUDGMENT",
                desc: "[신령의 심판] 성스러운 백색 광을 등진 최상위 개체 '소년(신령)'이 강림했습니다. 판결봉을 들어 올리며 당신의 업보와 탐욕의 무게를 대조합니다.",
                video: "media/s5.mp4",
                choices: [
                    { text: "최종 판결 로그 열람", next: "final" }
                ]
            }
        };

        function updateUI() {
            document.getElementById('karma').innerText = state.karma;
            document.getElementById('greed').innerText = state.greed;
            document.getElementById('asset').innerText = state.asset;
            document.getElementById('noise').innerText = state.noise;

            const container = document.getElementById('game-container');
            if(state.isError) container.classList.add('error-mode');
            else container.classList.remove('error-mode');
        }

        function renderScene(sceneId) {
            if (sceneId === "final") {
                calculateEnding();
                return;
            }
            const scene = scenes[sceneId];
            document.getElementById('scene-title').innerText = scene.title;
            document.getElementById('description').innerText = scene.desc;
            
            const videoElement = document.getElementById('game-video');
            const placeholder = document.getElementById('placeholder');
            
            if (scene.video) {
                videoElement.src = scene.video;
                videoElement.style.display = 'block';
                placeholder.style.display = 'none';
                
                videoElement.play().catch(error => {
                    console.log("동영상 자동재생 오류 또는 브라우저 정책 대기:", error);
                });
            } else {
                videoElement.style.display = 'none';
                placeholder.style.display = 'flex';
            }

            const choicesContainer = document.getElementById('choices');
            choicesContainer.innerHTML = '';

            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerText = choice.text;
                btn.onclick = () => {
                    if (choice.effect) {
                        for (let key in choice.effect) { state[key] += choice.effect[key]; }
                    }
                    if (choice.action === "start") state.isError = true;
                    if (choice.action === "stop") state.isError = false;
                    updateUI();
                    renderScene(choice.next);
                };
                choicesContainer.appendChild(btn);
            });
        }

        function calculateEnding() {
            let title, desc, color, finalVideo;
            
            if (state.greed > state.karma + 30) {
                title = "LOG: VOID (배드엔딩)";
                desc = "[배드엔딩] 탐욕의 임계점을 넘었습니다. K의 몸이 검붉은 입자로 해체되며 수조의 어둠 속으로 빨려 들어갑니다. 암흑 속에서 잭이 악랄한 미소를 지으며 수조를 차지합니다.";
                color = "#ff1744";
                finalVideo = "media/gover.mp4"; 
            } 
            else if (state.karma >= 60) {
                title = "LOG: ASCENSION (해피엔딩)";
                desc = "[해피엔딩] 따뜻한 황금빛 자연광이 비치는 마당. 신령이 미소를 지으며 빛가루를 뿌립니다. K와 단 한 명의 진짜 아버지가 손을 잡고 안도의 눈물을 흘리며 미소 짓습니다.";
                color = "#a277ff";
                finalVideo = "media/enda.mp4"; 
            } 
            else {
                title = "LOG: RESET (노멀엔딩)";
                desc = "[노멀엔딩] 수조가 한계에 달해 청록색 디지털 파편으로 산산조각 나며 증발합니다. K는 모든 자산과 복제물을 잃었지만, 마침내 무거운 굴레를 벗어나 홀가분한 미소를 지어 보입니다.";
                color = "#f5f5f7";
                finalVideo = "media/endb.mp4"; 
            }

            const videoElement = document.getElementById('game-video');
            const placeholder = document.getElementById('placeholder');
            
            videoElement.src = finalVideo;
            videoElement.style.display = 'block';
            placeholder.style.display = 'none';
            videoElement.play().catch(e => console.log("엔딩 동영상 재생 실패: ", e));

            document.getElementById('scene-title').innerText = title;
            document.getElementById('scene-title').style.color = color;
            // 타이틀 그라디언트 초기화하고 단색 엔딩 컬러 적용을 위한 스타일 매니퓰레이션
            document.getElementById('scene-title').style.background = "none";
            document.getElementById('scene-title').style.webkitTextFillColor = color;
            
            document.getElementById('description').innerText = desc;
            document.getElementById('choices').innerHTML = '<button onclick="location.reload()" style="text-align:center;">SYSTEM REBOOT (다시 시작)</button>';
            state.isError = false;
            updateUI();
        }

        // 최초 게임 기동
        renderScene('start');
    </script>
</body>
</html>
